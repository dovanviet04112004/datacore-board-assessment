# Data paths
paths:
  raw_data: "data/raw"
  processed_data: "data/processed"
  final_data: "data/final"

# Merge settings
merge:
  # Columns to use for matching
  match_columns:
    - ticker
    - name_normalized
  # Similarity threshold for fuzzy matching (0-1)
  similarity_threshold: 0.85

# Logging
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
