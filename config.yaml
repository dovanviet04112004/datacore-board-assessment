# Cấu hình cho DataCore Board Assessment

# Cài đặt scraping
scraping:
  # Thời gian chờ tối đa (giây)
  timeout: 30
  # Độ trễ giữa các yêu cầu (giây) - tối thiểu 1-2 giây để tránh quá tải server
  delay: 1.5
  # Số lần thử lại tối đa cho yêu cầu thất bại
  max_retries: 3
  # User agent cho các yêu cầu
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"

# Cài đặt scraper CafeF
cafef:
  # Điểm cuối API (phát hiện qua XHR - nhanh hơn Selenium)
  api_url: "https://s.cafef.vn/Ajax/CongTy/BanLanhDao.aspx?sym={ticker}"
  # URL gốc (chỉ để tham khảo - dữ liệu tải qua AJAX)
  # page_url: "https://cafef.vn/du-lieu/{exchange}/{ticker}-ban-lanh-dao-so-huu.chn"

# Cài đặt scraper Vietstock
vietstock:
  base_url: "https://finance.vietstock.vn"
  # Mẫu URL: https://finance.vietstock.vn/{TICKER}/ban-lanh-dao.htm
  url_pattern: "{base_url}/{ticker}/ban-lanh-dao.htm"
  # Xử lý session: Dùng requests.Session() với CSRF token tự động qua cookies

