# Đường dẫn dữ liệu
paths:
  raw_data: "data/raw"
  processed_data: "data/processed"
  final_data: "data/final"

# Cài đặt merge
merge:
  # Các cột dùng để so khớp
  match_columns:
    - ticker
    - name_normalized
  # Ngưỡng tương đồng cho so khớp mờ (0-1)
  similarity_threshold: 0.85

# Cài đặt logging
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
