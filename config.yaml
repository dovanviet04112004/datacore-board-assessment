# Configuration for DataCore Board Assessment

# Scraping settings
scraping:
  # Request timeout in seconds
  timeout: 30
  # Delay between requests (seconds) - minimum 1-2 seconds to be respectful
  delay: 1.5
  # Maximum retries for failed requests
  max_retries: 3
  # User agent for requests
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"

# CafeF scraper settings
cafef:
  # API endpoint (discovered via XHR inspection - faster than Selenium)
  api_url: "https://s.cafef.vn/Ajax/CongTy/BanLanhDao.aspx?sym={ticker}"
  # Original URL (for reference only - data loaded via AJAX)
  # page_url: "https://cafef.vn/du-lieu/{exchange}/{ticker}-ban-lanh-dao-so-huu.chn"

# Vietstock scraper settings
vietstock:
  base_url: "https://finance.vietstock.vn"
  # URL pattern: https://finance.vietstock.vn/{TICKER}/ban-lanh-dao.htm
  url_pattern: "{base_url}/{ticker}/ban-lanh-dao.htm"
  # Session handling: Uses requests.Session() with auto CSRF token via cookies

